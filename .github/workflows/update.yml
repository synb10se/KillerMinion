name: Update from Template

on:
  workflow_dispatch: # Erlaubt den manuellen Start über die GitHub-Oberfläche

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Kompletten Verlauf abrufen, um Merge zu ermöglichen
      
      - name: Fetch and Merge Template
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add template https://github.com/kerniger/leapmotor-abrp-sync.git
          git fetch template
          
          # Versuche einen Merge ohne direkten Commit
          git merge template/main --allow-unrelated-histories --no-commit || true
          
          # Workflows dürfen durch den GITHUB_TOKEN nicht verändert werden.
          # Wir machen alle Änderungen an .github/workflows rückgängig, behalten aber den Merge-Status.
          git restore --staged .github/workflows/ || true
          git checkout HEAD -- .github/workflows/ || true
          git clean -fd .github/workflows/ || true
          
          # Erstelle den Commit (falls es Änderungen an Skripten gab oder ein leerer Merge-Commit nötig ist)
          git commit -m "Auto-Update vom Original-Template" || echo "Keine Updates vorhanden"
          
          # Änderungen pushen
          git push
