name: ABRP Sync

on:
  schedule:
    # 5-Minuten-Takt für Live-Navigation. 
    # WICHTIG: Damit die kostenlosen Server-Minuten nicht aufgebraucht werden,
    # muss das Repository in den GitHub-Settings auf "Public" gestellt sein!
    - cron: '*/5 * * * *'
  workflow_dispatch: # Erlaubt den manuellen Start über die GitHub-Oberfläche

permissions:
  contents: read

concurrency:
  group: abrp-sync
  cancel-in-progress: true

jobs:
  sync_to_abrp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Dependencies
        run: pip install -r requirements.txt
        
      - name: Fetch Certificates
        run: |
          mkdir -p custom_components/leapmotor
          curl -fsSL https://raw.githubusercontent.com/markoceri/leapmotor-certs/5d687448c11dd2253669d1c55710e688313d1e2b/app.crt -o custom_components/leapmotor/app_cert.pem
          curl -fsSL https://raw.githubusercontent.com/markoceri/leapmotor-certs/5d687448c11dd2253669d1c55710e688313d1e2b/app.key -o custom_components/leapmotor/app_key.pem
        
      - name: Run Leapmotor-ABRP Sync
        env:
          LEAPMOTOR_USERNAME: ${{ secrets.LEAPMOTOR_USERNAME }}
          LEAPMOTOR_PASSWORD: ${{ secrets.LEAPMOTOR_PASSWORD }}
          ABRP_TOKEN: ${{ secrets.ABRP_TOKEN }}
        run: python leapmotor_to_abrp.py --abrp-token "$ABRP_TOKEN" --once

